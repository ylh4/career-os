<!DOCTYPE html>
<!--
  Career OS dashboard — self-contained, read-only viewer.
  It renders window.CAREER_OS from ./pipeline-data.js (generated by `python scripts/funnel.py`).
  No network, no CDN, no write-back. Open directly via file://.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Career OS — dashboard</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#0b0f14; --bd:#30363d; --bd2:#21262d;
    --fg:#c9d1d9; --mut:#8b949e; --acc:#58a6ff; --grn:#3fb950; --amb:#d29922; --red:#f85149; --vio:#bc8cff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  a{color:var(--acc)}
  header{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;
    align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{margin:0;font-size:15px;letter-spacing:.04em;color:#fff}
  header h1 .px{color:var(--grn)}
  .meta{color:var(--mut);font-size:12px}
  .wrap{padding:16px 18px;max-width:1400px}
  .strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;min-width:96px}
  .stat .n{font-size:20px;color:#fff}
  .stat .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);
    border-bottom:1px solid var(--bd2);padding-bottom:6px;margin:26px 0 12px}
  /* kanban */
  .kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
  .col{background:var(--panel2);border:1px solid var(--bd2);border-radius:6px;min-width:190px;flex:1 0 190px}
  .col h3{margin:0;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--mut);border-bottom:1px solid var(--bd2);display:flex;justify-content:space-between}
  .col.term h3{color:var(--red)}
  .cards{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:30px}
  .card{background:var(--panel);border:1px solid var(--bd);border-left:3px solid var(--acc);
    border-radius:5px;padding:8px;cursor:pointer}
  .card:hover{border-color:var(--acc)}
  .card .co{color:#fff}
  .card .ti{color:var(--mut);font-size:12px}
  .card .row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px}
  .badge{padding:1px 6px;border-radius:10px;font-size:11px;border:1px solid var(--bd)}
  .pri{color:var(--grn);border-color:var(--grn)} .std{color:var(--amb);border-color:var(--amb)}
  .bak{color:var(--mut)} .over{color:var(--red)}
  /* charts */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
  .panel{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
  .panel h4{margin:0 0 10px;font-size:12px;color:var(--fg)}
  .bar{display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:8px;margin:5px 0}
  .bar .k{color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{background:var(--bd2);border-radius:3px;height:14px;overflow:hidden}
  .fill{height:100%;background:var(--acc);border-radius:3px}
  .bar .v{text-align:right;color:var(--fg)}
  /* drawer */
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none}
  #drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--panel);
    border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .18s ease;
    overflow:auto;padding:18px}
  #drawer.open{transform:none} #scrim.open{display:block}
  #drawer .x{float:right;cursor:pointer;color:var(--mut);font-size:18px}
  #drawer h3{margin:0 0 2px;color:#fff;font-size:15px}
  .kv{color:var(--mut)} .kv b{color:var(--fg);font-weight:400}
  .timeline{list-style:none;padding:0;margin:8px 0}
  .timeline li{padding:3px 0 3px 14px;border-left:2px solid var(--bd);position:relative}
  .timeline li::before{content:"";position:absolute;left:-5px;top:9px;width:8px;height:8px;
    border-radius:50%;background:var(--acc)}
  pre{background:var(--panel2);border:1px solid var(--bd2);border-radius:5px;padding:10px;
    overflow:auto;color:var(--fg);font-size:12px}
  .tog{cursor:pointer;color:var(--acc);user-select:none}
  .empty{padding:60px 18px;text-align:center;color:var(--mut)}
  .empty code{color:var(--grn)}
</style>
</head>
<body>
<header>
  <h1>career<span class="px">/</span>os</h1>
  <span class="meta" id="meta"></span>
</header>
<div id="root"></div>

<div id="scrim" onclick="closeDrawer()"></div>
<aside id="drawer"></aside>

<script src="./pipeline-data.js"></script>
<script>
const STATES=["discovered","scored","tailored","applied","screening","interview","offer"];
const TERMINAL=["rejected","ghosted","withdrawn"];
const D=window.CAREER_OS;
const $=(h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const tier=(t)=> t>=80?["pri","priority"]: t>=60?["std","standard"]:["bak","backup"];
let BY_ID={};

function bars(obj, fmt=(v)=>v, max=null){
  const entries=Object.entries(obj); const mx=max??Math.max(1,...entries.map(([,v])=>(typeof v==="number"?v:0)));
  return entries.map(([k,v])=>{
    const n=(typeof v==="number")?v:0; const w=mx?Math.round(100*n/mx):0;
    return `<div class="bar"><span class="k">${esc(k)}</span><span class="track"><span class="fill" style="width:${w}%"></span></span><span class="v">${esc(fmt(v))}</span></div>`;
  }).join("");
}

function render(){
  const meta=document.getElementById("meta");
  const root=document.getElementById("root");
  if(!D){root.innerHTML=`<div class="empty">No data loaded.<br><br>Run <code>python scripts/funnel.py</code> to generate <code>reports/pipeline-data.js</code>, then reload.</div>`;return;}
  D.pipeline.forEach(e=>BY_ID[e.id]=e);
  meta.textContent=`generated ${D.generatedAt} · source: ${D.source} · ${D.pipeline.length} opportunities`;

  const f=D.funnel||{}; const tiers={priority:0,standard:0,backup:0};
  D.pipeline.forEach(e=>{const t=(e.score&&typeof e.score.total==="number")?tier(e.score.total)[1]:null; if(t)tiers[t]++;});
  const contactsDue=(D.contacts||[]).filter(c=>c.overdue).length;

  const strip=`<div class="strip">
    ${stat(f.total,"total")}${stat(f.active,"active")}${stat(f.applied,"applied")}
    ${stat(tiers.priority,"priority")}${stat(tiers.standard,"standard")}${stat(tiers.backup,"backup")}
    ${stat((D.corpus||{}).accomplishments,"accomplishmts")}${stat((D.corpus||{}).stories,"stories")}
    ${stat((D.contacts||[]).length,"contacts")}${stat(contactsDue,"touches due")}
  </div>`;

  root.innerHTML=`<div class="wrap">${strip}
    <h2>Pipeline</h2>${kanban()}
    <h2>Funnel</h2>${charts()}
  </div>`;
  document.querySelectorAll("[data-id]").forEach(el=>el.onclick=()=>openDrawer(el.dataset.id));
  document.querySelectorAll(".tog").forEach(el=>el.onclick=()=>{const p=el.nextElementSibling;p.style.display=p.style.display==="none"?"block":"none";});
}
function stat(n,l){return `<div class="stat"><div class="n">${n??0}</div><div class="l">${l}</div></div>`;}

function kanban(){
  const by={}; D.pipeline.forEach(e=>{(by[e.state]=by[e.state]||[]).push(e);});
  const lanes=STATES.concat(TERMINAL.filter(s=>by[s]&&by[s].length));
  return `<div class="kanban">`+lanes.map(s=>{
    const list=(by[s]||[]).sort((a,b)=>(b.score?.total||0)-(a.score?.total||0));
    const term=TERMINAL.includes(s)?" term":"";
    return `<div class="col${term}"><h3><span>${s}</span><span>${list.length}</span></h3>
      <div class="cards">${list.map(card).join("")}</div></div>`;
  }).join("")+`</div>`;
}
function card(e){
  const t=e.score&&typeof e.score.total==="number"?e.score.total:null;
  const [cls,label]=t!=null?tier(t):["bak","—"];
  const due=e.next_action?.due||""; const over=due&&due<D.generatedAt&&!TERMINAL.includes(e.state);
  return `<div class="card" data-id="${esc(e.id)}">
    <div class="co">${esc(e.company)}</div><div class="ti">${esc(e.title)}</div>
    <div class="row"><span class="badge ${cls}">${t??"—"} ${label}</span>
      <span class="${over?"over":"kv"}">${due?("due "+esc(due)+(over?" ⚠":"")):""}</span></div></div>`;
}

function charts(){
  const f=D.funnel||{};
  const reach=f.reach||{}; const conv=f.conversion||{};
  const funnelBars=STATES.map(s=>{
    const mx=reach[STATES[0]]||1; const w=Math.round(100*(reach[s]||0)/mx);
    const c=conv[s]==null?"":` · ${conv[s]}%`;
    return `<div class="bar"><span class="k">${s}</span><span class="track"><span class="fill" style="width:${w}%"></span></span><span class="v">${reach[s]||0}${c}</span></div>`;
  }).join("");
  const resp=f.responseBySource||{};
  const respBars=Object.keys(resp).length?Object.entries(resp).map(([s,r])=>
    `<div class="bar"><span class="k">${esc(s)}</span><span class="track"><span class="fill" style="width:${r.rate||0}%"></span></span><span class="v">${r.responded}/${r.applied}${r.rate!=null?` (${r.rate}%)`:""}</span></div>`
  ).join(""):`<div class="kv">No applications yet.</div>`;
  const tis=f.timeInState||{};
  const tisBars=Object.keys(tis).length?bars(Object.fromEntries(Object.entries(tis).map(([k,v])=>[k,v.avgDays])),v=>v+"d"):`<div class="kv">Not enough history.</div>`;
  const tags=(D.corpus||{}).tags||{}; const topTags=Object.fromEntries(Object.entries(tags).slice(0,10));
  const rel={}; (D.contacts||[]).forEach(c=>{rel[c.relationship||"—"]=(rel[c.relationship||"—"]||0)+1;});
  return `<div class="grid">
    <div class="panel"><h4>Reach &amp; conversion</h4>${funnelBars}</div>
    <div class="panel"><h4>Response rate by source</h4>${respBars}</div>
    <div class="panel"><h4>Avg time-in-state</h4>${tisBars}</div>
    <div class="panel"><h4>Corpus — top tags</h4>${Object.keys(topTags).length?bars(topTags):'<div class="kv">No accomplishments.</div>'}</div>
    <div class="panel"><h4>Outreach — by relationship</h4>${Object.keys(rel).length?bars(rel):'<div class="kv">No contacts.</div>'}</div>
  </div>`;
}

function openDrawer(id){
  const e=BY_ID[id]; if(!e)return;
  const s=e.score||{}; const dims=["fit","comp","visa","remote","growth"];
  const dimBars=dims.map(d=>`<div class="bar"><span class="k">${d}</span><span class="track"><span class="fill" style="width:${(s[d]||0)*10}%"></span></span><span class="v">${s[d]??"—"}/10</span></div>`).join("");
  const t=typeof s.total==="number"?s.total:null; const tl=t!=null?tier(t):["bak","—"];
  const hist=(e.history||[]).map(h=>`<li><b>${esc(h.state)}</b> <span class="kv">${esc(h.date)}</span></li>`).join("");
  const contacts=(e.contacts||[]).map(c=>`<div class="kv">• ${esc(typeof c==="string"?c:(c.name||""))}</div>`).join("")||'<div class="kv">—</div>';
  const arts=(e.artifacts||[]).map(a=>`<div class="kv">• ${esc(a)}</div>`).join("")||'<div class="kv">—</div>';
  const dr=document.getElementById("drawer");
  dr.innerHTML=`<span class="x" onclick="closeDrawer()">✕</span>
    <h3>${esc(e.company)}</h3><div class="kv">${esc(e.title)} · ${esc(e.location||"")}</div>
    <div class="kv" style="margin:6px 0"><b>${esc(e.id)}</b> · ${esc(e.state)} · ${esc(e.comp||"")}</div>
    <h2>Score <span class="badge ${tl[0]}">${t??"—"} ${tl[1]}</span> <span class="kv">conf ${esc(s.confidence||"—")}</span></h2>
    ${dimBars}
    ${s.notes?`<p class="kv">${esc(s.notes)}</p>`:""}
    <h2>History</h2><ul class="timeline">${hist||'<li class="kv">—</li>'}</ul>
    <h2>Next action</h2><div class="kv">${e.next_action?esc(e.next_action.action)+" · due "+esc(e.next_action.due):"—"}</div>
    <h2>Contacts</h2>${contacts}
    <h2>Artifacts</h2>${arts}
    <h2><span class="tog">▸ raw JSON</span></h2><pre style="display:none">${esc(JSON.stringify(e,null,2))}</pre>`;
  dr.querySelector(".tog").onclick=()=>{const p=dr.querySelector("pre");p.style.display=p.style.display==="none"?"block":"none";};
  dr.classList.add("open");document.getElementById("scrim").classList.add("open");
}
function closeDrawer(){document.getElementById("drawer").classList.remove("open");document.getElementById("scrim").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});
render();
</script>
</body>
</html>
